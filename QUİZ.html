<!DOCTYPE html>
<html>
<head>
  <title>Two Player Quiz</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: green;
      color: white;
      overflow: hidden;
    }
    #container {
      display: flex;
      width: 100%;
      height: 100%;
    }
    .player {
      width: 50%;
      height: 100%;
      border: 2px solid white;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }
    .question-number { font-size: 24px; margin-bottom: 10px; }
    .outfit-name { font-size: 30px; font-weight: bold; margin: 20px 0; }
    button { margin: 10px; padding: 15px 25px; font-size: 18px; cursor: pointer; }
    .red-flash {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background-color:red;
      opacity:0.7;
      display:none;
      z-index:10;
    }
    #message {
      position:absolute;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size: 50px;
      font-weight:bold;
      display:none;
    }
  </style>
</head>
<body>

<div id="container">
  <div class="player" id="player1">
    <h2>Player 1</h2>
    <div class="question-number" id="num1"></div>
    <div class="outfit-name" id="q1"></div>
    <div class="answers" id="a1"></div>
    <div id="score1">Score: 0</div>
    <div class="red-flash" id="flash1"></div>
  </div>

  <div class="player" id="player2">
    <h2>Player 2</h2>
    <div class="question-number" id="num2"></div>
    <div class="outfit-name" id="q2"></div>
    <div class="answers" id="a2"></div>
    <div id="score2">Score: 0</div>
    <div class="red-flash" id="flash2"></div>
  </div>
</div>

<div id="message"></div>

<script>
const questions = [
  {name:"Sardinian Outfit", options:["Italy","Spain"]},
  {name:"Kimono", options:["Japan","China"]},
  {name:"Saree", options:["India","Pakistan"]},
  {name:"Moroccan Dress", options:["Morocco","Egypt"]},
  {name:"Hanbok", options:["South Korea","North Korea"]},
  {name:"Russian Traditional Dress", options:["Russia","Ukraine"]},
  {name:"Scottish Outfit", options:["Scotland","Ireland"]},
  {name:"Peruvian Outfit", options:["Peru","Bolivia"]},
  {name:"Turkish Traditional Clothes", options:["Turkey","Greece"]},
  {name:"Mexican Outfit", options:["Mexico","Spain"]}
];

let current = 0;
let scores = [0,0];
let answered = [false,false]; 
let correctIndex = 0;
let timer;

function loadQuestion() {
  if(current >= questions.length){
    showWinner();
    return;
  }

  const q = questions[current];
  document.getElementById('num1').innerText = (current+1)+". Question";
  document.getElementById('num2').innerText = (current+1)+". Question";
  document.getElementById('q1').innerText = q.name;
  document.getElementById('q2').innerText = q.name;

  answered = [false,false]; 
  correctIndex = Math.random() < 0.5 ? 0 : 1; // rastgele doğru cevap seç

  document.getElementById('a1').innerHTML = "";
  document.getElementById('a2').innerHTML = "";

  function createButton(playerIndex, answersDivId, scoreDivId, flashDivId, otherIndex) {
    const answersDiv = document.getElementById(answersDivId);
    q.options.forEach((opt,i)=>{
      const btn = document.createElement('button');
      btn.innerText = opt;
      btn.onclick = ()=>{
        if(answered[playerIndex]) return; 
        answered[playerIndex] = true;

        clearTimeout(timer); // timer durdur
        if(i === correctIndex){
          scores[playerIndex]++;
        } else {
          document.getElementById(flashDivId).style.display = "block";
          setTimeout(()=>{ document.getElementById(flashDivId).style.display = "none"; },500);
          // Diğer oyuncuya puan git
          scores[otherIndex]++;
          document.getElementById("score"+(otherIndex+1)).innerText = "Score: "+scores[otherIndex];
        }

        document.getElementById(scoreDivId).innerText = "Score: "+scores[playerIndex];

        showNewQuestionMessage();
      };
      answersDiv.appendChild(btn);
    });
  }

  createButton(0,"a1","score1","flash1",1);
  createButton(1,"a2","score2","flash2",0);

  // 7 saniye timer
  timer = setTimeout(()=>{
    document.getElementById('message').innerText = "KONUŞ ARTIK!";
    document.getElementById('message').style.display = "block";
    setTimeout(()=>{
      document.getElementById('message').style.display = "none";
      current++;
      loadQuestion();
    },1500);
  },7000);
}

function showNewQuestionMessage(){
  const messageDiv = document.getElementById('message');
  messageDiv.innerText = "YENİ SORU!";
  messageDiv.style.display = "block";
  setTimeout(()=>{
    messageDiv.style.display = "none";
    current++;
    loadQuestion();
  },800); 
}

function showWinner(){
  let winnerText = "";
  if(scores[0] > scores[1]) winnerText = "SIGMA PLAYER 1 KAZANDI!";
  else if(scores[1] > scores[0]) winnerText = "SIGMA PLAYER 2 KAZANDI!";
  else winnerText = "SIGMA BERABERE!";
  const messageDiv = document.getElementById('message');
  messageDiv.innerText = winnerText;
  messageDiv.style.display = "block";
  messageDiv.style.fontSize = "70px";
}

loadQuestion();
</script>

</body>
</html>
